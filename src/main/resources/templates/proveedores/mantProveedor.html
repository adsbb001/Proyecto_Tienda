<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento de Proveedores</title>

    <!-- Fuentes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/inter@latest/index.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/proveedor.css}">
</head>
<body>

    <!-- HEADER -->
    <header class="crud-header">
        <div class="container crud-header-content">
            <div class="crud-header-left">
                <div class="crud-header-icon">
                    <i class="bi bi-truck"></i>
                </div>
                <div>
                    <h1>Proveedores</h1>
                    <p>Gestión y administración de proveedores</p>
                </div>
            </div>
            <a th:href="@{/home}" class="btn-volver">
                <i class="bi bi-arrow-left"></i>
                Volver al inicio
            </a>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container">
        <div class="crud-card">

            <!-- Encabezado de la card -->
            <div class="crud-card-header">
                <h3>
                    <i class="bi bi-list-ul"></i>
                    Listado de Proveedores
                </h3>
                <button id="btnNuevo"
                        class="btn-nuevo"
                        data-bs-toggle="modal"
                        data-bs-target="#modalProveedor">
                    <i class="bi bi-plus-circle"></i>
                    Nuevo Proveedor
                </button>
            </div>

            <!-- Alertas -->
            <div class="crud-card-body">

                <!-- Alerta de mensaje general -->
                <div th:if="${mensaje}" class="alert-mensaje">
                    <i class="bi bi-info-circle-fill"></i>
                    <span th:text="${mensaje}"></span>
                </div>

                <!-- Alerta de éxito -->
                <div th:if="${MensajeExito}" id="mensajeExito" class="alert-exito">
                    <i class="bi bi-check-circle-fill"></i>
                    <span th:text="${MensajeExito}"></span>
                </div>

                <!-- Tabla -->
                <div class="table-responsive">
                    <table id="tablaProveedor" class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>RUC</th>
                                <th>Razón Social</th>
                                <th>Teléfono</th>
                                <th>Correo</th>
                                <th>Contacto</th>
                                <th>Estado</th>
                                <th width="180">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${proveedores}">
                                <td th:text="${p.idProveedor}"></td>
                                <td><strong th:text="${p.ruc}"></strong></td>
                                <td th:text="${p.razonSocial}"></td>
                                <td th:text="${p.telefono}"></td>
                                <td>
                                    <a th:if="${p.correo != null}" 
                                       th:href="'mailto:' + ${p.correo}"
                                       style="color: #667eea; text-decoration: none;">
                                        <i class="bi bi-envelope"></i>
                                        <span th:text="${p.correo}"></span>
                                    </a>
                                    <span th:unless="${p.correo != null}">-</span>
                                </td>
                                <td th:text="${p.contacto}"></td>
                                <td>
                                    <span class="badge-estado"
                                          th:classappend="${p.estado == 1} ? 'badge-activo' : 'badge-inactivo'"
                                          th:text="${p.estado == 1 ? 'ACTIVO' : 'INACTIVO'}">
                                    </span>
                                </td>
                                <td>
                                    <button class="btn-editar btn-sm btnEditar"
                                            th:data-id="${p.idProveedor}">
                                        <i class="bi bi-pencil-square"></i>
                                        Editar
                                    </button>
                                    <button class="btn-eliminar btn-sm btnEliminar"
                                            th:data-id="${p.idProveedor}">
                                        <i class="bi bi-trash"></i>
                                        Eliminar
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- MODAL PROVEEDOR -->
    <div class="modal fade" id="modalProveedor" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <form id="frmProveedor"
                      th:action="@{/gestionproveedor/registrar}"
                      th:object="${proveedor}"
                      method="post">

                    <input type="hidden" id="idProveedor" th:field="*{idProveedor}">

                    <div class="modal-header">
                        <h5 class="modal-title" id="tituloModal">
                            <i class="bi bi-plus-circle"></i>
                            Registrar Proveedor
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label for="ruc" class="form-label">RUC</label>
                                <input id="ruc"
                                       type="text"
                                       maxlength="11"
                                       class="form-control"
                                       th:field="*{ruc}"
                                       placeholder="Ej: 20123456789">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="razonSocial" class="form-label">Razón Social</label>
                                <input id="razonSocial"
                                       type="text"
                                       class="form-control"
                                       th:field="*{razonSocial}"
                                       placeholder="Nombre de la empresa">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="telefono" class="form-label">Teléfono</label>
                                <input id="telefono"
                                       type="text"
                                       class="form-control"
                                       th:field="*{telefono}"
                                       placeholder="Ej: 987654321">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="correo" class="form-label">Correo</label>
                                <input id="correo"
                                       type="email"
                                       class="form-control"
                                       th:field="*{correo}"
                                       placeholder="ejemplo@correo.com">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="contacto" class="form-label">Persona de Contacto</label>
                                <input id="contacto"
                                       type="text"
                                       class="form-control"
                                       th:field="*{contacto}"
                                       placeholder="Nombre del contacto">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="estado" class="form-label">Estado</label>
                                <select id="estado"
                                        class="form-select"
                                        th:field="*{estado}">
                                    <option value="1">ACTIVO</option>
                                    <option value="0">INACTIVO</option>
                                </select>
                            </div>

                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i>
                            Guardar
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- DataTables -->
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

    <script th:inline="javascript">
        // Context path dinámico
        var ctx = /*[[@{/}]]*/ '/';

        $(document).ready(function() {

            // Inicializar DataTable
            $('#tablaProveedor').DataTable({
                language: {
                    url: "//cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json",
                    search: "Buscar:",
                    lengthMenu: "Mostrar _MENU_ registros",
                    info: "Mostrando _START_ a _END_ de _TOTAL_ registros",
                    infoEmpty: "Mostrando 0 registros",
                    zeroRecords: "No se encontraron resultados",
                    paginate: {
                        first: "Primero",
                        last: "Último",
                        next: "Siguiente",
                        previous: "Anterior"
                    }
                }
            });

            // Botón Nuevo
            $("#btnNuevo").click(function(){
                $("#idProveedor").val("");
                $("#ruc").val("");
                $("#razonSocial").val("");
                $("#telefono").val("");
                $("#correo").val("");
                $("#contacto").val("");
                $("#estado").val("1");
                $("#frmProveedor").attr("action", ctx + "gestionproveedor/registrar");
                $("#tituloModal").html('<i class="bi bi-plus-circle"></i> Registrar Proveedor');
            });

            // Botón Editar
            $(document).on("click", ".btnEditar", function(){
                let id = $(this).data("id");

                $.get(ctx + "gestionproveedor/buscar/" + id, function(data){
                    $("#idProveedor").val(data.idProveedor);
                    $("#ruc").val(data.ruc);
                    $("#razonSocial").val(data.razonSocial);
                    $("#telefono").val(data.telefono);
                    $("#correo").val(data.correo);
                    $("#contacto").val(data.contacto);
                    $("#estado").val(data.estado);

                    $("#frmProveedor").attr("action", ctx + "gestionproveedor/actualizar");
                    $("#tituloModal").html('<i class="bi bi-pencil-square"></i> Editar Proveedor');

                    let modal = new bootstrap.Modal(document.getElementById("modalProveedor"));
                    modal.show();
                });
            });

            // Botón Eliminar
            $(document).on("click", ".btnEliminar", function() {
                let id = $(this).data("id");

                if(confirm("¿Desea desactivar este Proveedor?")) {
                    window.location = ctx + "gestionproveedor/eliminar/" + id;
                }
            });
        });
    </script>

    <!-- Auto-cerrar alerta de éxito -->
    <script>
        setTimeout(function() {
            let mensaje = document.getElementById("mensajeExito");
            if(mensaje){
                let alerta = new bootstrap.Alert(mensaje);
                alerta.close();
            }
        }, 3000);
    </script>

</body>
</html>

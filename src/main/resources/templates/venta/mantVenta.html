<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Gestión de Ventas</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
body {
    background: #f4f6fb;
    font-family: Inter, Arial, sans-serif;
}

.page-header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 35px 0;
    border-radius: 0 0 28px 28px;
}

.card-main {
    border: 0;
    border-radius: 22px;
    box-shadow: 0 12px 35px rgba(0,0,0,.08);
    margin-top: -25px;
}

.btn-new {
    background: linear-gradient(135deg, #11998e, #38ef7d);
    border: none;
    color: white;
}

.table thead th {
    background: #eef2ff;
    color: #374151;
}

.search-box {
    border-radius: 14px;
}
</style>
</head>

<body>

<header class="page-header">
    <div class="container">
        <h1 class="fw-bold mb-1">
            <i class="bi bi-graph-up-arrow"></i> Gestión de Ventas
        </h1>
        <p class="mb-0">Registra, consulta y administra las ventas del sistema</p>
    </div>
</header>

<main class="container">

    <div class="card card-main p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-0">Listado de ventas</h4>
                <small class="text-muted">Ventas registradas en la base de datos</small>
            </div>

            <div>
                <a th:href="@{/}" class="btn btn-outline-secondary me-2">
                    <i class="bi bi-house"></i> Inicio
                </a>

                <a th:href="@{/gestionventa/nuevo}" class="btn btn-new">
                    <i class="bi bi-plus-circle"></i> Nueva Venta
                </a>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-5">
                <input type="text"
                       id="buscarVenta"
                       class="form-control search-box"
                       placeholder="Buscar por cliente, método o fecha...">
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle" id="tablaVentas">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Método de pago</th>
                        <th>Fecha</th>
                        <th>Total</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="v : ${ventas}">
                        <td>
                            <span class="badge bg-primary" th:text="${v.idVenta}"></span>
                        </td>

                        <td th:text="${v.cliente != null ? v.cliente.nombre : 'Venta sin cliente'}"></td>

                        <td>
                            <span class="badge bg-success"
                                  th:text="${v.metodoPago != null ? v.metodoPago.nombre : 'Sin método'}">
                            </span>
                        </td>

                        <td th:text="${v.fecha}"></td>

                        <td>
                            <strong>S/ <span th:text="${v.total}"></span></strong>
                        </td>

                        <td class="text-center">
                            <a th:href="@{/gestionventa/editar/{id}(id=${v.idVenta})}"
                               class="btn btn-warning btn-sm">
                                <i class="bi bi-pencil-square"></i>
                            </a>

                            <a th:href="@{/gestionventa/eliminar/{id}(id=${v.idVenta})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Seguro que deseas eliminar esta venta?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${ventas == null or #lists.isEmpty(ventas)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-2 d-block"></i>
                            No hay ventas registradas
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</main>

<script>
document.getElementById("buscarVenta").addEventListener("keyup", function () {
    let filtro = this.value.toLowerCase();
    let filas = document.querySelectorAll("#tablaVentas tbody tr");

    filas.forEach(function (fila) {
        let texto = fila.innerText.toLowerCase();
        fila.style.display = texto.includes(filtro) ? "" : "none";
    });
});
</script>

</body>
</html>

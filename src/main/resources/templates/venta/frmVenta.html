<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Venta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/inter@latest/index.css">
    <link rel="stylesheet" th:href="@{/css/ventas.css}">
</head>
<body>

    <!-- ========================================
         HEADER
         ======================================== -->
    <header class="form-venta-header">
        <div class="container">
            <div class="form-venta-header-content">
                <div class="form-venta-header-left">
                    <div class="form-venta-header-icon">
                        <i class="bi bi-cart-plus-fill"></i>
                    </div>
                    <div>
                        <h1>Registrar Nueva Venta</h1>
                        <p>Completa los datos y agrega los productos al carrito</p>
                    </div>
                </div>
                <a th:href="@{/gestionventa/lista}" class="btn-volver">
                    <i class="bi bi-arrow-left"></i> Volver al Listado
                </a>
            </div>
        </div>
    </header>

    <!-- ========================================
         CONTENIDO PRINCIPAL
         ======================================== -->
    <main class="container">

        <!-- Mensajes -->
        <div th:if="${mensaje}" class="alert-custom exito">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${mensaje}">Mensaje</span>
        </div>
        <div th:if="${error}" class="alert-custom error">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${error}">Error</span>
        </div>

        <form th:action="@{/gestionventa/guardar}" method="post" th:object="${ventaDTO}">

            <!-- ========================================
                 DATOS GENERALES DE LA VENTA
                 ======================================== -->
            <div class="form-card">
                <div class="form-card-header datos-venta">
                    <i class="bi bi-clipboard-data-fill"></i>
                    <h3>Datos de la Venta</h3>
                </div>
                <div class="form-card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label-custom">
                                <i class="bi bi-person-fill"></i> Cliente (opcional)
                            </label>
                            <select th:field="*{idCliente}" class="form-select-custom">
                                <option value="">-- Venta anónima --</option>
                                <option th:each="c : ${clientes}"
                                        th:value="${c.idCliente}"
                                        th:text="${c.nombre}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-custom">
                                <i class="bi bi-credit-card-fill"></i> Método de Pago *
                            </label>
                            <select th:field="*{idMetodoPago}" class="form-select-custom" required>
                                <option value="">-- Seleccione --</option>
                                <option th:each="m : ${metodosPago}"
                                        th:value="${m.idMetodoPago}"
                                        th:text="${m.nombre}"></option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ========================================
                 AGREGAR PRODUCTOS
                 ======================================== -->
            <div class="form-card">
                <div class="form-card-header agregar-producto">
                    <i class="bi bi-box-seam-fill"></i>
                    <h3>Agregar Productos</h3>
                </div>
                <div class="form-card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label-custom">
                                <i class="bi bi-upc-scan"></i> Producto
                            </label>
                            <select id="selProducto" class="form-select-custom">
                                <option value="">-- Seleccione producto --</option>
                                <option th:each="p : ${productos}"
                                        th:value="${p.idProducto}"
                                        th:data-nombre="${p.nombre}"
                                        th:data-precio="${p.precioVenta}"
                                        th:data-stock="${p.stock}"
                                        th:text="${p.nombre + ' - S/ ' + p.precioVenta + ' (Stock: ' + p.stock + ')'}">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label-custom">
                                <i class="bi bi-hash"></i> Cantidad
                            </label>
                            <input type="number" id="txtCantidad" min="1" value="1" class="form-control-custom">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="button" class="btn-agregar-carrito" onclick="agregarProducto()">
                                <i class="bi bi-plus-circle-fill"></i> Agregar
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ========================================
                 CARRITO DE COMPRAS
                 ======================================== -->
            <div class="form-card">
                <div class="form-card-header carrito">
                    <i class="bi bi-cart3"></i>
                    <h3>Productos en el Carrito</h3>
                </div>
                <div class="table-responsive">
                    <table class="tabla-carrito">
                        <thead>
                            <tr>
                                <th class="text-center">#</th>
                                <th>Producto</th>
                                <th class="text-center">Cant.</th>
                                <th class="text-end">P. Unit.</th>
                                <th class="text-end">Subtotal</th>
                                <th class="text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyDetalles">
                            <tr id="filaVacia">
                                <td colspan="6">
                                    <div class="carrito-vacio">
                                        <i class="bi bi-cart-x"></i>
                                        <p>No hay productos en el carrito. Agrega productos arriba.</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr>
                                <th colspan="4" class="text-end">
                                    <span class="total-label">TOTAL:</span>
                                </th>
                                <th class="text-end">
                                    <span class="total-valor" id="totalVenta">S/ 0.00</span>
                                </th>
                                <th></th>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <!-- Campos ocultos que se envían al backend -->
            <div id="camposOcultos"></div>

            <!-- ========================================
                 BOTONES DE ACCIÓN
                 ======================================== -->
            <div class="acciones-form">
                <button type="submit" class="btn-registrar">
                    <i class="bi bi-check-circle-fill"></i> Registrar Venta
                </button>
                <a th:href="@{/gestionventa/lista}" class="btn-cancelar">
                    <i class="bi bi-x-circle-fill"></i> Cancelar
                </a>
            </div>
        </form>
    </main>

    <!-- ========================================
         JAVASCRIPT PARA EL CARRITO DINÁMICO
         ======================================== -->
		 <script>
		     let detalles = [];

		     function agregarProducto() {
		         const sel = document.getElementById('selProducto');
		         const cant = parseInt(document.getElementById('txtCantidad').value);

		         if (!sel.value) {
		             alert('⚠️ Seleccione un producto');
		             return;
		         }
		         if (cant < 1) {
		             alert('️ La cantidad debe ser mayor a 0');
		             return;
		         }

		         const opt = sel.options[sel.selectedIndex];
		         const stock = parseInt(opt.dataset.stock);

		         if (cant > stock) {
		             alert('⚠️ Stock disponible: ' + stock);
		             return;
		         }

		         const existente = detalles.find(d => d.idProducto === sel.value);
		         if (existente) {
		             if (existente.cantidad + cant > stock) {
		                 alert('⚠️ Stock disponible: ' + stock + '. Ya tienes ' + existente.cantidad + ' en el carrito.');
		                 return;
		             }
		             existente.cantidad += cant;
		         } else {
		             detalles.push({
		                 idProducto: sel.value,
		                 nombre: opt.dataset.nombre,
		                 cantidad: cant,
		                 precio: parseFloat(opt.dataset.precio)
		             });
		         }

		         // ✅ NUEVO: Actualizar stock en el combo
		         const stockRestante = stock - cant;
		         opt.dataset.stock = stockRestante;
		         opt.text = opt.dataset.nombre + ' - S/ ' + parseFloat(opt.dataset.precio).toFixed(2) + ' (Stock: ' + stockRestante + ')';

		         // Si el stock llega a 0, deshabilitar la opción
		         if (stockRestante <= 0) {
		             opt.disabled = true;
		             opt.text += ' [AGOTADO]';
		         }

		         renderTabla();
		         sel.value = '';
		         document.getElementById('txtCantidad').value = 1;
		     }

		     function eliminar(i) {
		         if (confirm('¿Eliminar este producto del carrito?')) {
		             // ✅ NUEVO: Devolver stock al combo
		             const itemEliminado = detalles[i];
		             const option = document.querySelector(`#selProducto option[value="${itemEliminado.idProducto}"]`);
		             
		             if (option) {
		                 const stockActual = parseInt(option.dataset.stock);
		                 const stockRecuperado = stockActual + itemEliminado.cantidad;
		                 option.dataset.stock = stockRecuperado;
		                 option.text = option.dataset.nombre + ' - S/ ' + parseFloat(option.dataset.precio).toFixed(2) + ' (Stock: ' + stockRecuperado + ')';
		                 option.disabled = false;
		             }

		             detalles.splice(i, 1);
		             renderTabla();
		         }
		     }

		     function renderTabla() {
		         const tb = document.getElementById('tbodyDetalles');
		         const oc = document.getElementById('camposOcultos');
		         tb.innerHTML = '';
		         oc.innerHTML = '';
		         let total = 0;

		         if (detalles.length === 0) {
		             tb.innerHTML = `
		                 <tr id="filaVacia">
		                     <td colspan="6">
		                         <div class="carrito-vacio">
		                             <i class="bi bi-cart-x"></i>
		                             <p>No hay productos en el carrito. Agrega productos arriba.</p>
		                         </div>
		                     </td>
		                 </tr>`;
		             document.getElementById('totalVenta').innerText = 'S/ 0.00';
		             return;
		         }

		         detalles.forEach((d, i) => {
		             const sub = d.cantidad * d.precio;
		             total += sub;
		             tb.innerHTML += `
		                 <tr>
		                     <td class="text-center">${i + 1}</td>
		                     <td>${d.nombre}</td>
		                     <td class="text-center"><strong>${d.cantidad}</strong></td>
		                     <td class="text-end">S/ ${d.precio.toFixed(2)}</td>
		                     <td class="text-end"><strong>S/ ${sub.toFixed(2)}</strong></td>
		                     <td class="text-center">
		                         <button type="button" class="btn-eliminar-item" onclick="eliminar(${i})">
		                             <i class="bi bi-trash-fill"></i> Eliminar
		                         </button>
		                     </td>
		                 </tr>`;

		             oc.innerHTML += `
		                 <input type="hidden" name="detalles[${i}].idProducto" value="${d.idProducto}">
		                 <input type="hidden" name="detalles[${i}].cantidad" value="${d.cantidad}">
		             `;
		         });

		         document.getElementById('totalVenta').innerText = 'S/ ' + total.toFixed(2);
		     }
		 </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

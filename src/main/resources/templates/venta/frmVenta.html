<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Formulario Venta</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="card shadow border-0">

        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">
                <i class="bi bi-cart-plus"></i> Registrar Venta
            </h3>
        </div>

        <div class="card-body">

            <form th:action="@{/gestionventa/guardar}" th:object="${venta}" method="post">

                <input type="hidden" th:field="*{idVenta}">

                <div class="row mb-4">

                    <div class="col-md-3 mb-3">
                        <label>Código Venta</label>
                        <input type="text" class="form-control" th:value="${codigoVenta}" readonly>
                    </div>

                    <div class="col-md-5 mb-3">
                        <label>Cliente</label>
                        <select class="form-select" th:field="*{cliente.idCliente}">
                            <option value="">Venta sin cliente</option>
                            <option th:each="c : ${clientes}"
                                    th:value="${c.idCliente}"
                                    th:text="${c.nombre}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Método de Pago</label>
                        <select class="form-select" th:field="*{metodoPago.idMetodoPago}" required>
                            <option value="">Seleccione</option>
                            <option th:each="m : ${metodosPago}"
                                    th:value="${m.idMetodoPago}"
                                    th:text="${m.nombre}">
                            </option>
                        </select>
                    </div>

                </div>

                <h5 class="border-bottom pb-2 mb-3">
                    <i class="bi bi-box-seam"></i> Detalle de Productos
                </h5>

                <div class="row g-3 align-items-end mb-3">

                    <div class="col-md-3">
                        <label>Categoría</label>
                        <select id="categoria" class="form-select">
                            <option value="">Todas las categorías</option>
                            <option th:each="cat : ${categorias}"
                                    th:value="${cat.idCategoria}"
                                    th:text="${cat.nombre}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label>Producto</label>
                        <select id="producto" class="form-select">
                            <option value="">Seleccione producto</option>
                            <option th:each="p : ${productos}"
                                    th:value="${p.idProducto}"
                                    th:text="${p.nombre + ' | S/. ' + p.precioVenta + ' | Stock: ' + p.stock}"
                                    th:data-precio="${p.precioVenta}"
                                    th:data-stock="${p.stock}"
                                    th:data-categoria="${p.categoria.idCategoria}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label>Precio</label>
                        <input type="number" id="precio" class="form-control" readonly>
                    </div>

                    <div class="col-md-2">
                        <label>Cantidad</label>
                        <input type="number" id="cantidad" class="form-control" value="1" min="1">
                    </div>

                    <div class="col-md-1">
                        <button type="button" class="btn btn-success w-100" onclick="agregarProducto()">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>

                </div>

                <table class="table table-bordered table-hover">
                    <thead class="table-primary">
                        <tr>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                            <th>Subtotal</th>
                            <th>Acción</th>
                        </tr>
                    </thead>

                    <tbody id="detalleVenta">
                        <tr id="filaVacia">
                            <td colspan="5" class="text-center text-muted">
                                No hay productos agregados
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div id="inputsDetalle"></div>

                <div class="row justify-content-end">
                    <div class="col-md-3">
                        <label class="fw-bold">Total S/.</label>
                        <input type="number" id="total" th:field="*{total}" class="form-control" readonly required>
                    </div>
                </div>

                <div class="mt-4 text-end">
                    <a th:href="@{/gestionventa/lista}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Volver
                    </a>

                    <button type="reset" class="btn btn-warning">
                        <i class="bi bi-file-earmark"></i> Nuevo
                    </button>

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Guardar Venta
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<script>
let total = 0;
let contador = 0;

document.getElementById("producto").addEventListener("change", function () {
    let option = this.options[this.selectedIndex];
    document.getElementById("precio").value = option.getAttribute("data-precio") || "";
});

document.getElementById("categoria").addEventListener("change", function () {
    let categoria = this.value;
    let productos = document.getElementById("producto").options;

    for (let i = 0; i < productos.length; i++) {
        let catProducto = productos[i].getAttribute("data-categoria");

        if (productos[i].value === "") {
            productos[i].hidden = false;
        } else {
            productos[i].hidden = categoria !== "" && catProducto !== categoria;
        }
    }

    document.getElementById("producto").value = "";
    document.getElementById("precio").value = "";
});

function agregarProducto() {
    let select = document.getElementById("producto");
    let option = select.options[select.selectedIndex];

    let idProducto = select.value;
    let nombreProducto = option.text;
    let precio = parseFloat(option.getAttribute("data-precio"));
    let stock = parseInt(option.getAttribute("data-stock"));
    let cantidad = parseInt(document.getElementById("cantidad").value);

    if (!idProducto) {
        alert("Seleccione un producto");
        return;
    }

    if (cantidad <= 0) {
        alert("La cantidad debe ser mayor a cero");
        return;
    }

    if (cantidad > stock) {
        alert("No hay stock suficiente. Stock disponible: " + stock);
        return;
    }

    document.getElementById("filaVacia")?.remove();

    let subtotal = precio * cantidad;
    total += subtotal;
    contador++;

    let fila = `
        <tr id="fila${contador}">
            <td>${nombreProducto}</td>
            <td>${cantidad}</td>
            <td>S/ ${precio.toFixed(2)}</td>
            <td>S/ ${subtotal.toFixed(2)}</td>
            <td>
                <button type="button" class="btn btn-danger btn-sm" onclick="eliminarFila(${contador}, ${subtotal})">
                    Quitar
                </button>
            </td>
        </tr>
    `;

    document.getElementById("detalleVenta").insertAdjacentHTML("beforeend", fila);

    let inputs = `
        <div id="input${contador}">
            <input type="hidden" name="productoIds" value="${idProducto}">
            <input type="hidden" name="cantidades" value="${cantidad}">
            <input type="hidden" name="precios" value="${precio}">
            <input type="hidden" name="subtotales" value="${subtotal}">
        </div>
    `;

    document.getElementById("inputsDetalle").insertAdjacentHTML("beforeend", inputs);
    document.getElementById("total").value = total.toFixed(2);
}

function eliminarFila(id, subtotal) {
    document.getElementById("fila" + id).remove();
    document.getElementById("input" + id).remove();

    total -= subtotal;
    document.getElementById("total").value = total.toFixed(2);

    if (document.querySelectorAll("#detalleVenta tr").length === 0) {
        document.getElementById("detalleVenta").innerHTML =
            `<tr id="filaVacia"><td colspan="5" class="text-center text-muted">No hay productos agregados</td></tr>`;
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Mantenimiento de Productos</title>

<!-- Fuentes -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/inter@latest/index.css">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- DataTables (solo afecta al listado, pero no molesta en el formulario) -->
<link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">

<!-- CSS personalizado -->
<link rel="stylesheet" th:href="@{/css/producto.css}">
	

</head>
<body>

    <!-- HEADER -->
    <header class="crud-header">
        <div class="container crud-header-content">

            <div class="crud-header-left">
                <div class="crud-header-icon">
                    <i class="bi bi-box-seam-fill"></i>
                </div>

                <div>
                    <h1>Productos</h1>
                    <p>Registro y edición de productos</p>
                </div>
            </div>

			<div class="d-flex gap-2 flex-wrap">

			    <a th:href="@{/home}" class="btn-volver">
			        <i class="bi bi-house-fill"></i>
			        Inicio
			    </a>

			    <a th:href="@{/gestionconsultas/consultas}" class="btn-volver">
			        <i class="bi bi-search"></i>
			        Consultas
			    </a>

			    <a th:href="@{/gestionreporte/lista}" class="btn-volver">
			        <i class="bi bi-bar-chart-fill"></i>
			        Reportes
			    </a>

			</div>

        </div>
    </header>
	
	

    <!-- CONTENIDO -->
    <main class="container">

        <div class="crud-card">

			<div class="crud-card-header d-flex justify-content-between align-items-center">

			    <h3 class="m-0">
			        <i class="bi bi-box-seam"></i>
			        Lista de Productos
			    </h3>

			    <a th:href="@{/gestionproducto/nuevo}"
			       class="btn btn-success">

			        <i class="bi bi-plus-circle"></i>
			        Nuevo Producto

			    </a>

			</div>

			<div class="crud-card-body">
				
				<div th:if="${mensaje}" class="alert-mensaje">
				        <i class="bi bi-info-circle-fill"></i>
				        <span th:text="${mensaje}"></span>
				    </div>
					
					<div th:if="${MensajeExito}" id="msg" class="alert-exito">
					    <i class="bi bi-check-circle-fill"></i>
					    <span th:text="${MensajeExito}"></span>
					</div>

			    </div>

				<div class="table-responsive">

			    <table class="table table-hover" id="tablaProducto">

			        <thead class="table-dark">

			            <tr>
			                <th>ID</th>
			                <th>Código</th>
			                <th>Nombre</th>
			                <th>Categoría</th>
			                <th>Marca</th>
			                <th>Precio Venta</th>
			                <th>Stock</th>
			                <th>Acciones</th>
			            </tr>

			        </thead>


			        <tbody>

			            <tr th:each="p : ${productos}">

			                <td th:text="${p.idProducto}"></td>

			                <td th:text="${p.codigo}"></td>

			                <td th:text="${p.nombre}"></td>

			                <td th:text="${p.categoria.nombre}"></td>

			                <td th:text="${p.marca.nombre}"></td>

			                <td th:text="${p.precioVenta}"></td>

			                <td th:text="${p.stock}"></td>


			                <td>

			                    <a class="btn btn-warning btn-sm"
			                       th:href="@{/gestionproducto/editar/{id}(id=${p.idProducto})}">
			                        <i class="bi bi-pencil"></i>
			                    </a>


			                    <a class="btn btn-danger btn-sm"
			                       th:href="@{/gestionproducto/eliminar/{id}(id=${p.idProducto})}"
			                       onclick="return confirm('¿Eliminar producto?')">
			                        <i class="bi bi-trash"></i>
			                    </a>

			                </td>

			            </tr>

			        </tbody>

			    </table>

			</div>

            </div>

        </div>

    </main>


<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script
	src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script
	src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

	<script th:inline="javascript">

	$(document).ready(function() {

	    $('#tablaProducto').DataTable({

	        language: {
	            url: "//cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json",
	            search: "Buscar:",
	            lengthMenu: "Mostrar _MENU_ registros",
	            info: "Mostrando _START_ a _END_ de _TOTAL_ registros",
	            infoEmpty: "Mostrando 0 registros",
	            zeroRecords: "No se encontraron resultados",
	            paginate: {
	                first: "Primero",
	                last: "Último",
	                next: "Siguiente",
	                previous: "Anterior"
	            }
	        }

	    });

	});

	</script>

<script>
setTimeout(function() {
	let mensaje = document.getElementById("msg");
	if (mensaje) {
		let alerta = new bootstrap.Alert(mensaje);
		alerta.close();
	}
}, 3000);
</script>

</body>
</html>

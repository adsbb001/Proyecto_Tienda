<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Mantenimiento de Productos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet"
	href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

</head>
<body>

<div class="container-fluid mt-4">

	<div class="card shadow">

		<div class="card-header bg-success text-white">
			<h3 class="mb-0">Mantenimiento de Productos</h3>
		</div>

		<div class="card-body">

			<div class="alert alert-info">
				<span th:text="${mensaje}"></span>
			</div>

			<div id="msg"
				 th:if="${MensajeExito}"
				 class="alert alert-success alert-dismissible fade show mt-2">

				<span th:text="${MensajeExito}"></span>

				<button type="button"
						class="btn-close"
						data-bs-dismiss="alert">
				</button>

			</div>

			<a th:href="@{/gestionproducto/nuevo}"
				class="btn btn-success mb-3">
				<i class="bi bi-plus-circle"></i>
				Nuevo Producto
			</a>

			<table id="tablaProducto"
				class="table table-bordered table-hover table-striped">

				<thead class="table-dark">

					<tr>
						<th>ID</th>
						<th>Código</th>
						<th>Producto</th>
						<th>Categoría</th>
						<th>Marca</th>
						<th>Precio Compra</th>
						<th>Precio Venta</th>
						<th>Stock</th>
						<th>Stock Mínimo</th>
						<th>Acciones</th>
					</tr>

				</thead>

				<tbody>

					<tr th:each="p : ${productos}">

						<td th:text="${p.idProducto}"></td>

						<td th:text="${p.codigo}"></td>

						<td th:text="${p.nombre}"></td>

						<td th:text="${p.categoria.nombre}"></td>

						<td th:text="${p.marca.nombre}"></td>

						<td th:text="${p.precioCompra}"></td>

						<td th:text="${p.precioVenta}"></td>

						<td th:text="${p.stock}"></td>

						<td th:text="${p.stockMinimo}"></td>

						<td>

							<a
								th:href="@{/gestionproducto/editar/{id}(id=${p.idProducto})}"
								class="btn btn-warning btn-sm">

								<i class="bi bi-pencil-square"></i>
								Editar

							</a>

							<a
								th:href="@{/gestionproducto/eliminar/{id}(id=${p.idProducto})}"
								class="btn btn-danger btn-sm"
								onclick="return confirm('¿Desea eliminar este producto?')">

								<i class="bi bi-trash"></i>
								Eliminar

							</a>

						</td>

					</tr>

				</tbody>

			</table>

		</div>

	</div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script
	src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script
	src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script>

$(document).ready(function() {

	$('#tablaProducto').DataTable({

		language : {
			url : 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'
		}

	});

});

</script>

<script>
setTimeout(function() {
	let mensaje = document.getElementById("msg");
	if (mensaje) {
		let alerta = new bootstrap.Alert(mensaje);
		alerta.close();
	}
}, 3000);
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Formulario Producto</title>

<!-- Fuentes -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/inter@latest/index.css">

<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- DataTables (solo afecta al listado, pero no molesta en el formulario) -->
	<link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">

<!-- CSS personalizado -->
	<link rel="stylesheet" th:href="@{/css/producto.css}">

</head>
<body>

<div class="container mt-4">

	<div class="card shadow">

		<div class="card-header bg-primary text-white">

			<h3 th:if="${producto.idProducto == null}">
				Registrar Producto
			</h3>

			<h3 th:if="${producto.idProducto != null}">
				Editar Producto
			</h3>

		</div>

		<div class="card-body">

			<form th:action="@{/gestionproducto/guardar}"
				th:object="${producto}"
				method="post">

				<input type="hidden"
					th:field="*{idProducto}">

				<div class="row">

					<div class="col-md-4 mb-3">

						<label>Código</label>

						<input type="text"
							class="form-control"
							th:field="*{codigo}"
							required>

					</div>

					<div class="col-md-8 mb-3">

						<label>Nombre</label>

						<input type="text"
							class="form-control"
							th:field="*{nombre}"
							required>

					</div>

					<div class="col-md-6 mb-3">

						<label>Categoría</label>

						<select class="form-select"
							th:field="*{categoria}">

							<option value="">
								Seleccione
							</option>

							<option
								th:each="c : ${categorias}"
								th:value="${c.idCategoria}"
								th:text="${c.nombre}">
							</option>

						</select>

					</div>

					<div class="col-md-6 mb-3">

						<label>Marca</label>

						<select class="form-select"
							th:field="*{marca}">

							<option value="">
								Seleccione
							</option>

							<option
								th:each="m : ${marcas}"
								th:value="${m.idMarca}"
								th:text="${m.nombre}">
							</option>

						</select>

					</div>

					<div class="col-md-3 mb-3">

						<label>Precio Compra</label>

						<input type="number"
							step="0.01"
							class="form-control"
							th:field="*{precioCompra}">

					</div>

					<div class="col-md-3 mb-3">

						<label>Precio Venta</label>

						<input type="number"
							step="0.01"
							class="form-control"
							th:field="*{precioVenta}">

					</div>

					<div class="col-md-3 mb-3">

						<label>Stock</label>

						<input type="number"
							class="form-control"
							th:field="*{stock}">

					</div>

					<div class="col-md-3 mb-3">

						<label>Stock Mínimo</label>

						<input type="number"
							class="form-control"
							th:field="*{stockMinimo}">

					</div>

				</div>

				<button type="submit"
					class="btn btn-primary">

					Guardar

				</button>

				<a th:href="@{/gestionproducto/lista}"
					class="btn btn-secondary">

					Volver

				</a>

			</form>

		</div>

	</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Mantenimiento de Categorías</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<!-- DataTables -->
<link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"
      rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h3 class="mb-0">Mantenimiento de Categorías</h3>

            <a href="#" class="btn btn-light">
                Nueva Categoría
            </a>

        </div>

        <div class="card-body">

            <div class="alert alert-info"
                 th:text="${mensaje}">
            </div>

            <table id="tablaCategorias"
                   class="table table-bordered table-hover table-striped">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th width="180">Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="c : ${categorias}">

                        <td th:text="${c.idCategoria}"></td>

                        <td th:text="${c.nombre}"></td>

                        <td>

                            <a href="#"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <a href="#"
                               class="btn btn-danger btn-sm">
                                Eliminar
                            </a>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- JQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script>
$(document).ready(function() {

    $('#tablaCategorias').DataTable({

        language: {

            search: "Buscar:",

            lengthMenu: "Mostrar _MENU_ registros",

            info: "Mostrando _START_ a _END_ de _TOTAL_ registros",

            infoEmpty: "Mostrando 0 registros",

            zeroRecords: "No se encontraron resultados",

            paginate: {
                first: "Primero",
                last: "Último",
                next: "Siguiente",
                previous: "Anterior"
            }

        }

    });

});
</script>

</body>
</html>
